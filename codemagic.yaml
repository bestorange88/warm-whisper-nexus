workflows:
  ios-app:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: JIUFENG
    environment:
      groups:
        - ios_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "chat.archime.app"
      vars:
        BUNDLE_ID: "chat.archime.app"
        APPLE_TEAM_ID: "S54QM22WX2"
        IOS_PROFILE_NAME: "CHATARCHIME"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        # 营销版本号（用户在 App Store 看到的版本，必须为 X.Y 或 X.Y.Z 格式）
        # 单一真源：Android workflow 通过 YAML alias 复用此值，避免再出现 iOS/Android 不一致
        # 1.2 已在 App Store Connect 关闭提交通道，因此这里提升到 1.2.1
        MARKETING_VERSION: &marketing_version "1.2.1"
        VITE_SUPABASE_PROJECT_ID: "ozkbiywqvbfqpjgqvkdq"
        VITE_SUPABASE_URL: "https://ozkbiywqvbfqpjgqvkdq.supabase.co"
        VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96a2JpeXdxdmJmcXBqZ3F2a2RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzYyMzEsImV4cCI6MjA5MTMxMjIzMX0.a38le1TH5lccW-e7qEkb0XzGSZlf51l-x3gDjS7KlDA"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Validate marketing version
        script: |
          # 营销版本号格式校验：必须是 X.Y 或 X.Y.Z（数字，每段最多 3 位）
          # 防止误填如 "1,2" "v1.2" "1.2.3.4" "1.22a"，或将 1.22 误改成 1.2 后触发已关闭 train 上传失败
          if [ -z "$MARKETING_VERSION" ]; then
            echo "❌ MARKETING_VERSION 未设置"
            exit 1
          fi
          if ! echo "$MARKETING_VERSION" | grep -Eq '^[0-9]{1,3}\.[0-9]{1,3}(\.[0-9]{1,3})?$'; then
            echo "❌ MARKETING_VERSION 格式无效: '$MARKETING_VERSION'"
            echo "   要求: X.Y 或 X.Y.Z（每段 1-3 位数字），例如 1.2 / 1.2.0 / 1.22"
            exit 1
          fi
          if [ "$MARKETING_VERSION" = "1.2" ]; then
            echo "❌ 当前 MARKETING_VERSION=1.2，但 App Store Connect 的 1.2 版本通道已关闭，无法继续上传。"
            echo "   请将版本提升为更高版本，例如 1.2.1 或 1.3。"
            exit 1
          fi
          echo "✅ MARKETING_VERSION 校验通过: $MARKETING_VERSION"
      - name: Install dependencies
        script: |
          npm install
      - name: Validate Capacitor iOS plugin versions
        script: |
          node <<'EOF'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const all = { ...(pkg.dependencies || {}), ...(pkg.devDependencies || {}) };
          const plugins = [
            '@capacitor/core',
            '@capacitor/ios',
            '@capacitor/android',
            '@capacitor/cli',
            '@capacitor/push-notifications',
            '@capacitor/status-bar',
            '@capacitor/keyboard',
          ];

          const normalizeMajor = (value) => {
            if (!value) return null;
            const match = String(value).match(/(\d+)/);
            return match ? Number(match[1]) : null;
          };

          const versions = plugins
            .filter((name) => all[name])
            .map((name) => ({ name, version: all[name], major: normalizeMajor(all[name]) }));

          const invalid = versions.filter((item) => item.major == null);
          if (invalid.length) {
            console.error('❌ 无法解析以下 Capacitor 版本号:');
            invalid.forEach((item) => console.error(`   - ${item.name}: ${item.version}`));
            process.exit(1);
          }

          const majors = [...new Set(versions.map((item) => item.major))];
          if (majors.length > 1) {
            console.error('❌ 检测到 Capacitor iOS 插件主版本不一致，Swift Package 依赖会冲突：');
            versions.forEach((item) => console.error(`   - ${item.name}: ${item.version}`));
            console.error('   要求：所有 @capacitor/* 插件主版本保持一致（当前项目应统一为 8.x）');
            process.exit(1);
          }

          console.log(`✅ Capacitor 插件主版本一致: ${majors[0]}.x`);
          EOF
      - name: Build web assets
        script: |
          # 写入 .env 以确保 Vite 构建时能读到 Supabase 配置（避免原生包白屏）
          cat > .env <<EOF
          VITE_SUPABASE_PROJECT_ID=$VITE_SUPABASE_PROJECT_ID
          VITE_SUPABASE_URL=$VITE_SUPABASE_URL
          VITE_SUPABASE_PUBLISHABLE_KEY=$VITE_SUPABASE_PUBLISHABLE_KEY
          EOF
          npm run build
      - name: Prepare and sync Capacitor iOS
        script: |
          if [ ! -d ios/App ]; then
            npx cap add ios
          fi
          npx cap sync ios
          if [ ! -d ios ]; then
            echo "iOS platform directory was not created"
            exit 1
          fi
      - name: Set unique build number
        script: |
          # Marketing version 来自 workflow 顶层 vars，保持 iOS / Android 一致
          echo "Setting marketing version: $MARKETING_VERSION"
          PREVIOUS_MARKETING=$(agvtool what-marketing-version -terse1 | tail -n 1 || true)
          if [ -n "$PREVIOUS_MARKETING" ]; then
            echo "Previous marketing version in project: $PREVIOUS_MARKETING"
          fi
          agvtool new-marketing-version "$MARKETING_VERSION"

          # Build number（UTC 时间戳，单调递增，App Store Connect 要求唯一）
          BUILD_NUMBER=$(date -u +%y%m%d%H%M%S)
          echo "Using build number: $BUILD_NUMBER"
          agvtool new-version -all "$BUILD_NUMBER"

          # 校验最终写入的版本与预期一致，防止 agvtool 静默失败
          ACTUAL_MARKETING=$(agvtool what-marketing-version -terse1 | tail -n 1)
          ACTUAL_BUILD=$(agvtool what-version -terse)
          if [ "$ACTUAL_MARKETING" != "$MARKETING_VERSION" ]; then
            echo "❌ Marketing version 写入失败: 预期 '$MARKETING_VERSION'，实际 '$ACTUAL_MARKETING'"
            exit 1
          fi
          if [ "$ACTUAL_BUILD" != "$BUILD_NUMBER" ]; then
            echo "❌ Build number 写入失败: 预期 '$BUILD_NUMBER'，实际 '$ACTUAL_BUILD'"
            exit 1
          fi
          if [ "$ACTUAL_MARKETING" = "$PREVIOUS_MARKETING" ]; then
            echo "⚠️ Marketing version 未变化：仍为 $ACTUAL_MARKETING"
            echo "   若上一个已上架版本也是该值，上传到 App Store Connect 会被拒绝。"
          fi
          echo "✅ iOS 版本写入成功: $ACTUAL_MARKETING ($ACTUAL_BUILD)"
        working_directory: ios/App
      - name: Inject Info.plist permissions
        script: |
          PLIST_PATH="ios/App/App/Info.plist"
          if [ ! -f "$PLIST_PATH" ]; then
            echo "Info.plist not found at $PLIST_PATH"
            exit 1
          fi

          # 出口合规：声明应用未使用受限加密（仅用 HTTPS/标准系统加密）
          if ! /usr/libexec/PlistBuddy -c "Print :ITSAppUsesNonExemptEncryption" "$PLIST_PATH" 2>/dev/null; then
            /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST_PATH"
          fi

          # Camera – video calls
          if ! /usr/libexec/PlistBuddy -c "Print :NSCameraUsageDescription" "$PLIST_PATH" 2>/dev/null; then
            /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string '用于视频通话 / Used for video calls'" "$PLIST_PATH"
          fi

          # Microphone – voice & video calls
          if ! /usr/libexec/PlistBuddy -c "Print :NSMicrophoneUsageDescription" "$PLIST_PATH" 2>/dev/null; then
            /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string '用于语音通话和视频通话 / Used for voice and video calls'" "$PLIST_PATH"
          fi

          # Photo Library – send images
          if ! /usr/libexec/PlistBuddy -c "Print :NSPhotoLibraryUsageDescription" "$PLIST_PATH" 2>/dev/null; then
            /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string '用于选择和发送图片 / Used to select and send photos'" "$PLIST_PATH"
          fi

          echo "Info.plist permissions configured:"
          /usr/libexec/PlistBuddy -c "Print :NSCameraUsageDescription" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Print :NSMicrophoneUsageDescription" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Print :NSPhotoLibraryUsageDescription" "$PLIST_PATH"

          # Create localized InfoPlist.strings for Chinese
          ZH_LPROJ="ios/App/App/zh-Hans.lproj"
          mkdir -p "$ZH_LPROJ"
          cat > "$ZH_LPROJ/InfoPlist.strings" << 'EOF'
          NSCameraUsageDescription = "用于视频通话";
          NSMicrophoneUsageDescription = "用于语音通话和视频通话";
          NSPhotoLibraryUsageDescription = "用于选择和发送图片";
          EOF

          # Create localized InfoPlist.strings for English
          EN_LPROJ="ios/App/App/en.lproj"
          mkdir -p "$EN_LPROJ"
          cat > "$EN_LPROJ/InfoPlist.strings" << 'EOF'
          NSCameraUsageDescription = "Used for video calls";
          NSMicrophoneUsageDescription = "Used for voice and video calls";
          NSPhotoLibraryUsageDescription = "Used to select and send photos";
          EOF

          echo "Localized InfoPlist.strings created for zh-Hans and en"
      - name: Install CocoaPods if needed
        script: |
          PODFILE_DIR="$(find ios -maxdepth 3 -name Podfile -exec dirname {} \; | head -n 1)"
          if [ -z "$PODFILE_DIR" ]; then
            echo "No Podfile found; project uses Swift Package Manager — skipping CocoaPods"
            exit 0
          fi
          cd "$PODFILE_DIR"
          pod install --repo-update
      - name: Set up code signing
        script: |
          PROJECT_PATH="$XCODE_PROJECT"
          if [ ! -d "$PROJECT_PATH" ]; then
            PROJECT_PATH="$(find ios -maxdepth 4 -name '*.xcodeproj' | head -n 1)"
          fi

          if [ -z "$PROJECT_PATH" ] || [ ! -d "$PROJECT_PATH" ]; then
            echo "No Xcode project found for code signing"
            ls -R ios || true
            exit 1
          fi

          echo "Using project for code signing: $PROJECT_PATH"

          xcode-project use-profiles \
            --project "$PROJECT_PATH" \
            --archive-method app-store \
            --code-signing-setup-verbose-logging

          echo "Installed provisioning profiles:"
          ls "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles" || true
          ls "$HOME/Library/MobileDevice/Provisioning Profiles" || true

          echo "Signing summary after profile mapping:"
          xcodebuild -project "$PROJECT_PATH" -scheme "$XCODE_SCHEME" -showBuildSettings | grep -E "PRODUCT_BUNDLE_IDENTIFIER|DEVELOPMENT_TEAM|CODE_SIGN_STYLE|PROVISIONING_PROFILE_SPECIFIER|PROVISIONING_PROFILE|CODE_SIGN_IDENTITY" || true
      - name: Build IPA
        script: |
          # 优先级：完整的独立 .xcworkspace（CocoaPods）> 完整的内嵌 project.xcworkspace（SPM）> .xcodeproj
          PODFILE_PATH="$(find ios -maxdepth 4 -name Podfile | head -n 1)"
          PROJECT_PATH="$XCODE_PROJECT"
          WORKSPACE_PATH=""
          BUILD_WITH=""

          if [ ! -d "$PROJECT_PATH" ]; then
            PROJECT_PATH="$(find ios -maxdepth 4 -name '*.xcodeproj' | head -n 1)"
          fi

          if [ -z "$PROJECT_PATH" ] || [ ! -d "$PROJECT_PATH" ]; then
            echo "❌ No Xcode project found"
            ls -R ios || true
            exit 1
          fi

          SCHEME_PATH="$PROJECT_PATH/xcshareddata/xcschemes/$XCODE_SCHEME.xcscheme"
          if [ ! -f "$SCHEME_PATH" ]; then
            echo "❌ Shared scheme not found: $SCHEME_PATH"
            echo "   CI 构建需要共享 scheme；请确认 $XCODE_SCHEME 已提交到 xcshareddata/xcschemes"
            exit 1
          fi

          if [ -n "$PODFILE_PATH" ]; then
            # CocoaPods 模式：仅使用完整的独立 workspace（必须包含 contents.xcworkspacedata）
            WORKSPACE_PATH="$XCODE_WORKSPACE"
            if [ ! -d "$WORKSPACE_PATH" ] || [ ! -f "$WORKSPACE_PATH/contents.xcworkspacedata" ]; then
              WORKSPACE_PATH="$(find ios -maxdepth 4 -name '*.xcworkspace' -not -path '*/project.xcworkspace' | head -n 1)"
            fi
            if [ -n "$WORKSPACE_PATH" ] && [ -f "$WORKSPACE_PATH/contents.xcworkspacedata" ]; then
              BUILD_WITH="workspace"
            fi
          fi

          # SPM 内嵌 workspace 只有在内容完整时才使用；当前项目里该目录缺少 contents.xcworkspacedata，
          # 直接传给 xcodebuild 会在 "showBuildSettings" 阶段以状态码 74 失败。
          if [ -z "$BUILD_WITH" ]; then
            WORKSPACE_PATH="$PROJECT_PATH/project.xcworkspace"
            if [ -d "$WORKSPACE_PATH" ] && [ -f "$WORKSPACE_PATH/contents.xcworkspacedata" ]; then
              BUILD_WITH="workspace"
            fi
          fi

          if [ -z "$BUILD_WITH" ]; then
            BUILD_WITH="project"
            echo "⚠️ No complete workspace found; falling back to project build: $PROJECT_PATH"
          fi

          echo "Resolving Swift Package dependencies..."
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$XCODE_SCHEME"

          if [ "$BUILD_WITH" = "workspace" ]; then
            echo "Building with workspace: $WORKSPACE_PATH"
            xcode-project build-ipa \
              --workspace "$WORKSPACE_PATH" \
              --scheme "$XCODE_SCHEME"
          else
            echo "Building with project: $PROJECT_PATH"
            xcode-project build-ipa \
              --project "$PROJECT_PATH" \
              --scheme "$XCODE_SCHEME"
          fi
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - info@archime.chat
        notify:
          success: true
          failure: true

  android-app:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - android_credentials
      vars:
        BUNDLE_ID: "chat.archime.app"
        # 营销版本号与 iOS 使用同一真源，避免手动改一端漏另一端
        MARKETING_VERSION: *marketing_version
        VITE_SUPABASE_PROJECT_ID: "ozkbiywqvbfqpjgqvkdq"
        VITE_SUPABASE_URL: "https://ozkbiywqvbfqpjgqvkdq.supabase.co"
        VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96a2JpeXdxdmJmcXBqZ3F2a2RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzYyMzEsImV4cCI6MjA5MTMxMjIzMX0.a38le1TH5lccW-e7qEkb0XzGSZlf51l-x3gDjS7KlDA"
      node: 22
      java: 17
    scripts:
      - name: Validate marketing version
        script: |
          if [ -z "$MARKETING_VERSION" ]; then
            echo "❌ MARKETING_VERSION 未设置"
            exit 1
          fi
          if ! echo "$MARKETING_VERSION" | grep -Eq '^[0-9]{1,3}\.[0-9]{1,3}(\.[0-9]{1,3})?$'; then
            echo "❌ MARKETING_VERSION 格式无效: '$MARKETING_VERSION'"
            echo "   要求: X.Y 或 X.Y.Z（每段 1-3 位数字），例如 1.2 / 1.2.0 / 1.22"
            exit 1
          fi
          echo "✅ MARKETING_VERSION 校验通过: $MARKETING_VERSION"
      - name: Install dependencies
        script: |
          npm install
      - name: Validate Capacitor Android plugin versions
        script: |
          node <<'EOF'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const all = { ...(pkg.dependencies || {}), ...(pkg.devDependencies || {}) };
          const plugins = [
            '@capacitor/core',
            '@capacitor/ios',
            '@capacitor/android',
            '@capacitor/cli',
            '@capacitor/push-notifications',
            '@capacitor/status-bar',
            '@capacitor/keyboard',
          ];

          const normalizeMajor = (value) => {
            if (!value) return null;
            const match = String(value).match(/(\d+)/);
            return match ? Number(match[1]) : null;
          };

          const versions = plugins
            .filter((name) => all[name])
            .map((name) => ({ name, version: all[name], major: normalizeMajor(all[name]) }));

          const invalid = versions.filter((item) => item.major == null);
          if (invalid.length) {
            console.error('❌ 无法解析以下 Capacitor 版本号:');
            invalid.forEach((item) => console.error(`   - ${item.name}: ${item.version}`));
            process.exit(1);
          }

          const majors = [...new Set(versions.map((item) => item.major))];
          if (majors.length > 1) {
            console.error('❌ 检测到 Capacitor 插件主版本不一致，原生构建会失败：');
            versions.forEach((item) => console.error(`   - ${item.name}: ${item.version}`));
            console.error('   要求：所有 @capacitor/* 插件主版本保持一致（当前项目应统一为 8.x）');
            process.exit(1);
          }

          console.log(`✅ Capacitor 插件主版本一致: ${majors[0]}.x`);
          EOF
      - name: Build web assets
        script: |
          # 写入 .env 以确保 Vite 构建时能读到 Supabase 配置（避免原生包白屏）
          cat > .env <<EOF
          VITE_SUPABASE_PROJECT_ID=$VITE_SUPABASE_PROJECT_ID
          VITE_SUPABASE_URL=$VITE_SUPABASE_URL
          VITE_SUPABASE_PUBLISHABLE_KEY=$VITE_SUPABASE_PUBLISHABLE_KEY
          EOF
          npm run build
      - name: Prepare and sync Capacitor Android
        script: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android
          if [ ! -d android ]; then
            echo "Android platform directory was not created"
            exit 1
          fi
      - name: Set version name and code
        script: |
          # versionCode：10 位 UTC 时间戳，确保 < 2^31（int 最大约 21 亿，10 位足够单调递增到 2099 年）
          BUILD_NUMBER=$(date -u +%y%m%d%H%M)
          echo "Using versionName: $MARKETING_VERSION, versionCode: $BUILD_NUMBER"

          GRADLE="android/app/build.gradle"
          if [ ! -f "$GRADLE" ]; then
            echo "❌ $GRADLE not found"
            exit 1
          fi

          # 同步更新 versionCode 与 versionName，与 iOS 保持一致
          sed -i'' -e "s/versionCode [0-9]*/versionCode $BUILD_NUMBER/" "$GRADLE"
          sed -i'' -e "s/versionName \"[^\"]*\"/versionName \"$MARKETING_VERSION\"/" "$GRADLE"

          # 校验
          ACTUAL_NAME=$(grep -E 'versionName' "$GRADLE" | head -n 1 | sed -E 's/.*versionName "([^"]*)".*/\1/')
          ACTUAL_CODE=$(grep -E 'versionCode' "$GRADLE" | head -n 1 | sed -E 's/.*versionCode ([0-9]+).*/\1/')
          if [ "$ACTUAL_NAME" != "$MARKETING_VERSION" ]; then
            echo "❌ versionName 写入失败: 预期 '$MARKETING_VERSION'，实际 '$ACTUAL_NAME'"
            exit 1
          fi
          if [ "$ACTUAL_CODE" != "$BUILD_NUMBER" ]; then
            echo "❌ versionCode 写入失败: 预期 '$BUILD_NUMBER'，实际 '$ACTUAL_CODE'"
            exit 1
          fi
          echo "✅ Android 版本写入成功: $ACTUAL_NAME ($ACTUAL_CODE)"

      - name: Verify cross-platform marketing version sync
        script: |
          IOS_VERSION=$(awk '/MARKETING_VERSION: &marketing_version/{gsub(/"/, "", $3); print $3; exit}' codemagic.yaml)
          ANDROID_VERSION=$(awk '/MARKETING_VERSION: \*marketing_version/{print ENVIRON["MARKETING_VERSION"]; exit}' codemagic.yaml)

          if [ -z "$IOS_VERSION" ] || [ -z "$ANDROID_VERSION" ]; then
            echo "❌ 无法解析 codemagic.yaml 中的跨平台版本配置"
            exit 1
          fi

          if [ "$IOS_VERSION" != "$ANDROID_VERSION" ]; then
            echo "❌ iOS/Android marketing version 不一致: iOS=$IOS_VERSION Android=$ANDROID_VERSION"
            exit 1
          fi

          echo "✅ iOS/Android marketing version 已同步: $IOS_VERSION"
      - name: Build APK and AAB
        script: |
          cd android
          chmod +x gradlew

          echo "=== Building release APK ==="
          ./gradlew assembleRelease

          echo "=== Building release AAB (for Google Play) ==="
          ./gradlew bundleRelease

          echo "=== Build outputs ==="
          find app/build/outputs -name "*.apk" -o -name "*.aab" | head -20
      - name: Sign APK (if keystore provided)
        script: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found to sign"
            exit 1
          fi

          if [ -n "$CM_KEYSTORE" ] && [ -f "$CM_KEYSTORE" ]; then
            echo "Signing APK with provided keystore..."
            SIGNED_APK="${APK_PATH%.apk}-signed.apk"
            jarsigner -verbose \
              -keystore "$CM_KEYSTORE" \
              -storepass "$CM_KEYSTORE_PASSWORD" \
              -keypass "$CM_KEY_PASSWORD" \
              "$APK_PATH" \
              "$CM_KEY_ALIAS"

            ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/zipalign -v 4 "$APK_PATH" "$SIGNED_APK"
            mv "$SIGNED_APK" "$APK_PATH"
            echo "APK signed successfully"
          else
            echo "No keystore configured — APK is unsigned (debug signing only)"
            echo "To enable signing, add android_credentials group in Codemagic with:"
            echo "  CM_KEYSTORE (keystore file)"
            echo "  CM_KEYSTORE_PASSWORD"
            echo "  CM_KEY_PASSWORD"
            echo "  CM_KEY_ALIAS"
          fi
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
      - android/app/build/outputs/bundle/**/*.aab
    publishing:
      email:
        recipients:
          - info@archime.chat
        notify:
          success: true
          failure: true
